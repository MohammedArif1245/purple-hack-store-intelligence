version: "3.9"

services:
  # ── PostgreSQL 15 ──
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: store_intelligence
      POSTGRES_USER: si_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-si_password_2026}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U si_user -d store_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Intelligence API ──
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://si_user:${DB_PASSWORD:-si_password_2026}@db:5432/store_intelligence
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./sample_events.jsonl:/app/sample_events.jsonl
      - ./store_layout.json:/app/store_layout.json

  # ── Streamlit Dashboard ──
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
